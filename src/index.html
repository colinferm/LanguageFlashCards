<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>German Flashcards</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS home-screen icon (SVG not supported on iOS; PNG preferred but SVG
       is used here as a zero-dependency fallback — replace with a 180×180 PNG
       named icons/apple-touch-icon.png for best results on iOS Safari) -->
  <link rel="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  >

  <!-- App CSS -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Main application mount point -->
  <div id="app"></div>

  <!-- Vendor JS (CDN) -->
  <script
    src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.6/underscore-min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/backbone@1.5.0/backbone-min.js" crossorigin="anonymous"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"
  ></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js')
          .catch(function (err) {
            console.warn('Service worker registration failed:', err);
          });
      });
    }
  </script>

  <!-- APP_SCRIPTS_START -->
  <script src="js/data/vocabulary.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/models/AppSettings.js"></script>
  <script src="js/models/Flashcard.js"></script>
  <script src="js/models/FlashcardCollection.js"></script>
  <script src="js/views/MenuView.js"></script>
  <script src="js/views/VocabMenuView.js"></script>
  <script src="js/views/FlashcardView.js"></script>
  <script src="js/views/TestView.js"></script>
  <script src="js/views/SettingsView.js"></script>
  <script src="js/controllers/AppRouter.js"></script>
  <script src="js/app.js"></script>
  <!-- APP_SCRIPTS_END -->

</body>
</html>
